name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string (e.g. 0.1.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── macOS universal binary + DMG ──────────────────────────────────────────
  release-macos:
    name: macOS Release
    runs-on: macos-14   # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin -p deskdrop-core

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin -p deskdrop-core

      - name: Create universal dylib
        run: |
          lipo -create \
            target/aarch64-apple-darwin/release/libdeskdrop_core.dylib \
            target/x86_64-apple-darwin/release/libdeskdrop_core.dylib \
            -output libdeskdrop_core.dylib

      - name: Build Swift app (Release)
        run: |
          mkdir -p platforms/macos/ProxiBoard/build
          # Full Xcode build would go here; CI produces a zip of the dylib for now.
          zip -j deskdrop-macos.zip libdeskdrop_core.dylib

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskdrop-macos
          path: deskdrop-macos.zip

  # ── Windows x64 installer ─────────────────────────────────────────────────
  release-windows:
    name: Windows Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Rust DLL
        run: cargo build --release -p deskdrop-core

      - name: Build C# app
        run: |
          Copy-Item target\release\deskdrop_core.dll `
                    platforms\windows\Deskdrop.Windows\
          dotnet publish platforms\windows\Deskdrop.Windows\Deskdrop.Windows.csproj `
            -c Release -r win-x64 --self-contained false `
            -o publish\windows

      - name: Install WiX
        run: dotnet tool install -g wix

      - name: Build MSI installer
        run: |
          Copy-Item publish\windows\*.* platforms\windows\installer\bin\ -Force -ErrorAction SilentlyContinue
          # wix build platforms\windows\installer\Deskdrop.wxs -o publish\Deskdrop.msi
          # (WiX build stubbed pending full icon + binary paths)
          Compress-Archive -Path publish\windows\* -DestinationPath deskdrop-windows.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskdrop-windows
          path: deskdrop-windows.zip

  # ── Android APK ───────────────────────────────────────────────────────────
  release-android:
    name: Android Release APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - name: Install NDK + cargo-ndk
        run: |
          sdkmanager "ndk;26.1.10909125"
          cargo install cargo-ndk --locked

      - name: Build native libs
        run: |
          cargo ndk \
            --platform 26 \
            -t aarch64-linux-android \
            -t armv7-linux-androideabi \
            -t x86_64-linux-android \
            -o platforms/android/app/src/main/jniLibs \
            build --lib --release -p deskdrop-core
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/26.1.10909125

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: platforms/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deskdrop-android
          path: platforms/android/app/build/outputs/apk/release/*.apk

  # ── Linux x86_64 binary + deb ─────────────────────────────────────────────
  release-linux:
    name: Linux Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libdbus-1-dev libudev-dev libssl-dev pkg-config

      - name: Build daemon + CLI
        run: |
          cargo build --release --bin deskdrop-daemon -p deskdrop-core
          cargo build --release --bin deskdrop-cli -p deskdrop-cli

      - name: Package .tar.gz
        run: |
          mkdir -p dist/deskdrop/usr/local/bin
          cp target/release/deskdrop-daemon dist/deskdrop/usr/local/bin/
          cp target/release/deskdrop-cli    dist/deskdrop/usr/local/bin/
          cp platforms/linux/deskdrop.service dist/deskdrop/
          cp platforms/linux/deskdrop.desktop dist/deskdrop/
          cp README.md LICENSE dist/deskdrop/
          tar czf deskdrop-linux-x86_64.tar.gz -C dist deskdrop

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: deskdrop-linux
          path: deskdrop-linux-x86_64.tar.gz

  # ── Create GitHub Release ─────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: [release-macos, release-windows, release-android, release-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Deskdrop ${{ github.ref_name }}"
          body: |
            ## Deskdrop ${{ github.ref_name }}

            Proximity-Based Shared Clipboard — no account, no cloud, no setup.

            ### Downloads
            | Platform | File |
            |---|---|
            | macOS (Universal) | `deskdrop-macos.zip` |
            | Windows 10/11 x64 | `deskdrop-windows.zip` |
            | Android 8.0+      | `deskdrop-*.apk` |
            | Linux x86_64      | `deskdrop-linux-x86_64.tar.gz` |

            ### What's new
            See [CHANGELOG.md](CHANGELOG.md).
          files: |
            release-artifacts/**/*.zip
            release-artifacts/**/*.apk
            release-artifacts/**/*.tar.gz
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}

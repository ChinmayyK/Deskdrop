name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust core ──────────────────────────────────────────────────────────────
  rust-core:
    name: Rust Core (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            cliprelay-core
            cliprelay-cli
            platforms/linux

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            libdbus-1-dev \
            libudev-dev \
            pkg-config \
            libssl-dev \
            avahi-daemon \
            libavahi-client-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build --release --workspace

      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Run doc tests
        run: cargo test --workspace --doc

  # ── Integration tests (Linux only — requires mDNS) ────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - name: Install deps
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libdbus-1-dev libudev-dev libssl-dev avahi-daemon
          sudo systemctl start avahi-daemon || true
      - name: Run integration tests
        run: cargo test --workspace --tests
        timeout-minutes: 5

  # ── Benchmarks (compile check only, no execution) ────────────────────────
  bench-check:
    name: Benchmark Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - run: sudo apt-get update -q && sudo apt-get install -y libdbus-1-dev libudev-dev libssl-dev
      - run: cargo bench --no-run --workspace

  # ── Cross-compile for Android ABIs ───────────────────────────────────────
  android:
    name: Android cross-compile
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - armv7-linux-androideabi
          - x86_64-linux-android
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125"

      - name: Build for ${{ matrix.target }}
        run: |
          cargo ndk -p 26 -t ${{ matrix.target }} build --lib --release -p cliprelay-core
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/26.1.10909125

  # ── macOS dylib + Swift bridging header check ─────────────────────────────
  macos-platform:
    name: macOS platform build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build macOS dylib
        run: cargo build --release -p cliprelay-core

      - name: Check Swift files compile
        run: |
          swiftc \
            -typecheck \
            platforms/macos/ProxiBoard/AppDelegate.swift \
            platforms/macos/ProxiBoard/PreferencesView.swift \
            -import-objc-header platforms/macos/ProxiBoard/ProxiBoardBridge.h \
            -sdk $(xcrun --sdk macosx --show-sdk-path) \
            -target arm64-apple-macos13.0 \
        continue-on-error: true

  # ── Windows C# build ──────────────────────────────────────────────────────
  windows-platform:
    name: Windows platform build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build Windows DLL
        run: cargo build --release -p cliprelay-core

      - name: Build C# project
        run: |
          # Create a stub DLL so the csproj can resolve the native ref.
          New-Item -ItemType Directory -Force -Path platforms\windows\ProxiBoard.Windows\
          Copy-Item target\release\cliprelay_core.dll `
                    platforms\windows\ProxiBoard.Windows\cliprelay_core.dll `
                    -ErrorAction SilentlyContinue
          dotnet build platforms\windows\ProxiBoard.Windows\ProxiBoard.Windows.csproj `
            -c Release --no-restore

  # ── Security audit ────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit --locked
      - run: cargo audit

  # ── SBOM generation ───────────────────────────────────────────────────────
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
      - run: cargo install cargo-cyclonedx --locked
      - run: cargo cyclonedx --format json --all
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.json
